<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#0b1022"/>
  <text x="40" y="50" fill="#ffffff" font-size="32" font-family="Arial" font-weight="700">Minimax Visualizer — Example #5 (Alpha-Beta)</text>
  <text x="40" y="84" fill="#fca5a5" font-size="18" font-family="Arial">Pruned branches are highlighted in red (dashed).</text>

  <!-- edges -->
  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <line x1="600" y1="140" x2="320" y2="260" />
    <line x1="600" y1="140" x2="880" y2="260" />

    <line x1="320" y1="260" x2="180" y2="380" />
    <line x1="320" y1="260" x2="460" y2="380" />

    <line x1="880" y1="260" x2="740" y2="380" />
    <line x1="880" y1="260" x2="1020" y2="380" stroke="#ef4444" stroke-dasharray="10 8"/>

    <line x1="180" y1="380" x2="110" y2="520" />
    <line x1="180" y1="380" x2="250" y2="520" />

    <line x1="460" y1="380" x2="390" y2="520" />
    <line x1="460" y1="380" x2="530" y2="520" />

    <line x1="740" y1="380" x2="670" y2="520" />
    <line x1="740" y1="380" x2="810" y2="520" />

    <line x1="1020" y1="380" x2="950" y2="520" stroke="#ef4444" stroke-dasharray="10 8"/>
    <line x1="1020" y1="380" x2="1090" y2="520" stroke="#ef4444" stroke-dasharray="10 8"/>
  </g>

  <!-- nodes -->
  <g font-family="Arial" font-size="20" text-anchor="middle" dominant-baseline="middle" fill="#fff" stroke="#fff" stroke-width="2">
    <circle cx="600" cy="140" r="28" fill="#16a34a"/><text x="600" y="140" stroke="none">5</text>

    <circle cx="320" cy="260" r="28" fill="#1d4ed8"/><text x="320" y="260" stroke="none">5</text>
    <circle cx="880" cy="260" r="28" fill="#1d4ed8"/><text x="880" y="260" stroke="none">1</text>

    <circle cx="180" cy="380" r="28" fill="#16a34a"/><text x="180" y="380" stroke="none">5</text>
    <circle cx="460" cy="380" r="28" fill="#16a34a"/><text x="460" y="380" stroke="none">9</text>
    <circle cx="740" cy="380" r="28" fill="#16a34a"/><text x="740" y="380" stroke="none">2</text>
    <circle cx="1020" cy="380" r="28" fill="#ef4444"/><text x="1020" y="380" stroke="none">—</text>

    <circle cx="110" cy="520" r="24" fill="#7c3aed"/><text x="110" y="520" stroke="none">3</text>
    <circle cx="250" cy="520" r="24" fill="#7c3aed"/><text x="250" y="520" stroke="none">5</text>
    <circle cx="390" cy="520" r="24" fill="#7c3aed"/><text x="390" y="520" stroke="none">6</text>
    <circle cx="530" cy="520" r="24" fill="#7c3aed"/><text x="530" y="520" stroke="none">9</text>
    <circle cx="670" cy="520" r="24" fill="#7c3aed"/><text x="670" y="520" stroke="none">1</text>
    <circle cx="810" cy="520" r="24" fill="#7c3aed"/><text x="810" y="520" stroke="none">2</text>
    <circle cx="950" cy="520" r="24" fill="#ef4444"/><text x="950" y="520" stroke="none">0</text>
    <circle cx="1090" cy="520" r="24" fill="#ef4444"/><text x="1090" y="520" stroke="none">-1</text>
  </g>
</svg>
